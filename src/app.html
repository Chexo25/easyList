<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>EasyList</title>
    <script>
      try {
        const theme = localStorage.getItem('easyList_theme');
        if (theme && theme !== 'default') {
          document.documentElement.dataset.theme = theme;
        }
        const mode = localStorage.getItem('easyList_mode');
        if (mode === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app-splash" style="
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    ">
      <img src="/icon.png" alt="EasyList" style="width: 100px; height: 100px; border-radius: 22px;" />
      <span style="font-size: 24px; font-weight: 700; letter-spacing: -0.5px;">EasyList</span>
    </div>

    <script>
      try {
        const mode = localStorage.getItem('easyList_mode');
        const splash = document.getElementById('app-splash');
        if (splash && mode === 'dark') {
          splash.style.background = '#09090b';
          splash.querySelector('span').style.color = 'white';
        }
      } catch(e) {}
    </script>

    <script>
      window.addEventListener('load', () => {
        const splash = document.getElementById('app-splash');
        if (splash) {
          setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 400);
          }, 600);
        }
      });
    </script>

    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
